# AI 视频生成工具 - Nginx 配置
# 域名: cbc.cedricbwang.cloud
# 端口: 9999 (需要账号密码认证)

# 后端 API 服务器配置
upstream backend_api {
    server 127.0.0.1:9998;
    keepalive 32;
}

# 前端应用配置 - 直接提供静态文件
# upstream frontend_app {
#     server 127.0.0.1:9999;
#     keepalive 32;
# }

# 主服务器配置 - 仅监听 9999 端口
server {
    listen 9999;
    server_name video.werookies.com 43.132.153.123;

    # 日志配置
    access_log /var/log/nginx/video-gen-access.log;
    error_log /var/log/nginx/video-gen-error.log;

    # 客户端上传文件大小限制 (视频文件可能较大)
    client_max_body_size 500M;
    client_body_timeout 300s;

    # Basic Auth 认证配置
    auth_basic "Video Generation Tool - Login Required";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # 前端静态文件
    location / {
        root /var/www/video-gen;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 缓存配置
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /var/www/video-gen;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 后端 API 接口
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        
        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时配置 (AI 视频生成可能需要较长时间)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲配置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查端点 - 不需要认证
    location /health {
        auth_basic off;
        proxy_pass http://backend_api/health;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        access_log off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
