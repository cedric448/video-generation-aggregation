# 默认拒绝 80 端口访问
# 文件名以 00- 开头确保优先加载

# 作为默认服务器,捕获所有未匹配的 80 端口请求
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # 拒绝所有访问,提示使用 9999 端口
    return 403 "Access denied. Please visit http://video.werookies.com:9999 with authentication.\n";
    add_header Content-Type text/plain;
}

# 针对 video.werookies.com 域名的 80 端口访问
server {
    listen 80;
    listen [::]:80;
    server_name video.werookies.com;
    
    # 拒绝所有访问,提示使用 9999 端口
    return 403 "Access denied. Please visit http://video.werookies.com:9999 with authentication.\n";
    add_header Content-Type text/plain;
}

# 针对 IP 地址的 80 端口访问
server {
    listen 80;
    listen [::]:80;
    server_name 43.132.153.123;
    
    # 拒绝所有访问,提示使用 9999 端口
    return 403 "Access denied. Please visit http://video.werookies.com:9999 with authentication.\n";
    add_header Content-Type text/plain;
}
